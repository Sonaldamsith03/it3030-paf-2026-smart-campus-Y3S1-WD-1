# Server Configuration
server.port=8081

# MongoDB Atlas Configuration
# Use local fallback if MONGODB_URI is not provided to prevent startup crash
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/campus_hub}

# Jackson Configuration for LocalDateTime
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# OAuth2 Google Configuration
# Use dummy values to allow context initialization when env vars are missing
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:MISSING_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:MISSING_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
